name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - ".github/workflows/deploy-book.yml"
  workflow_dispatch:

# Allow the deploy job to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy at a time; don't cancel an in-progress prod deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: "0.4.40"
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory=/usr/local/bin
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build book
        run: mdbook build book
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
